<div id="fltrDrwr" class="fltr-drwr" aria-hidden="true">
  <div class="fltr-drwr-ovl"></div>
  <div class="fltr-drwr-cntnt" role="dialog" aria-modal="true" aria-label="Mobile filters">
    <div class="fltr-drwr-hdr">
      <div class="fltr-drwr-hdr-top">
        <h2 class="fltr-drwr-ttl">Filters</h2>
        <button id="closeFltrDrwr" class="fltr-drwr-close" type="button" aria-label="Close filters">
          <i class="fas fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="fltr-drwr-bdy">
      <div class="mob-srt-fltr-cntr">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Sort by
        </h3>
        <div class="custom-dropdown" id="mobSortDropdown">
          <div class="custom-dropdown-selected" id="mobSortDropdownSelected">
            <span>Recommended</span>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="custom-dropdown-options" id="mobSortDropdownOptions">
            <div class="custom-dropdown-option selected" data-value="recommended">Recommended</div>
            <div class="custom-dropdown-option" data-value="most-popular">Most Popular</div>
            <div class="custom-dropdown-option" data-value="least-popular">Least Popular</div>
            <div class="custom-dropdown-option" data-value="price-asc">Price: Low to High</div>
            <div class="custom-dropdown-option" data-value="price-desc">Price: High to Low</div>
            <div class="custom-dropdown-option" data-value="name-asc">Name: A to Z</div>
          </div>
        </div>
      </div>

      <div class="mob-pltf-fltr-cntr">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Platform
        </h3>
        <div class="mob-pltf-grid">
          <div class="mob-pltf-chkbx">
            <input type="checkbox" id="mobWin" data-pltf="windows">
            <label for="mobWin">Windows</label>
          </div>
          <div class="mob-pltf-chkbx">
            <input type="checkbox" id="mobMac" data-pltf="macos">
            <label for="mobMac">macOS</label>
          </div>
          <div class="mob-pltf-chkbx">
            <input type="checkbox" id="mobAnd" data-pltf="android">
            <label for="mobAnd">Android</label>
          </div>
          <div class="mob-pltf-chkbx">
            <input type="checkbox" id="mobIos" data-pltf="ios">
            <label for="mobIos">iOS</label>
          </div>
        </div>
      </div>

      <div class="mob-prc-fltr-cntr">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Price
        </h3>
        <div class="mob-prc-btns">
          <button class="mob-prc-btn actv" data-prc="all" type="button">All</button>
          <button class="mob-prc-btn" data-prc="free" type="button">Free</button>
          <button class="mob-prc-btn" data-prc="paid" type="button">Paid</button>
        </div>
      </div>

      <div class="mob-key-fltr-cntr">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Key
        </h3>
        <div class="mob-key-btns">
          <button class="mob-key-btn actv" data-key="all" type="button">All</button>
          <button class="mob-key-btn" data-key="keyless" type="button">Keyless</button>
          <button class="mob-key-btn" data-key="keysystem" type="button">Key System</button>
        </div>
      </div>

      <div class="mob-type-fltr-cntr">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Type
        </h3>
        <div class="mob-type-btns">
          <button class="mob-type-btn actv" data-type="all" type="button">All</button>
          <button class="mob-type-btn" data-type="external" type="button">Cheat Menu</button>
          <button class="mob-type-btn" data-type="executor" type="button">Executor</button>
        </div>
      </div>

      <div class="pltf-fltr-cntr show-only-section">
        <h3 class="fltr-sec-ttl">
          <span class="fltr-dot"></span>
          Show only
        </h3>
        <div class="pltf-chkbxs">
          <label class="cstm-chkbx vrf">
            <input type="checkbox" id="mobVrfSwch">
            <span class="chkmrk"></span>
            <span class="chkbx-lbl">Verified</span>
          </label>
          <label class="cstm-chkbx prem">
            <input type="checkbox" id="mobPremSwch">
            <span class="chkmrk"></span>
            <span class="chkbx-lbl">Premium</span>
          </label>
          <label class="cstm-chkbx updated">
            <input type="checkbox" id="mobUpdatedSwch">
            <span class="chkmrk"></span>
            <span class="chkbx-lbl">Updated</span>
          </label>
        </div>
      </div>
    </div>

    <div class="fltr-drwr-ftr">
      <button id="mobRstFltrs" class="mob-rst-fltrs-btn" type="button">Reset</button>
      <button id="applyFltrs" class="apply-fltrs-btn" type="button">Apply Filters</button>
    </div>
  </div>
</div>
